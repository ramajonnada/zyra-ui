name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library (zyra-ng-ui)
        run: npx ng build zyra-ng-ui --configuration=production

      - name: Build app (zyra-ui)
        run: npx ng build zyra-ui --configuration=production
