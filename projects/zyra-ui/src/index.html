<!doctype html>
<html lang="en">

	<head>
		<meta charset="utf-8" />

		<!-- Primary SEO -->
		<title>Zyra UI – Modern Angular UI Library</title>
		<meta name="description"
			content="Zyra UI is a modern Angular UI library with reusable components, utilities, and performance-focused design." />

		<!-- Angular base -->
		<base href="/" />


		<link rel="canonical" href="https://www.zyraui.dev" />
		<link rel="canonical" [attr.href]="'https://www.zyraui.dev' + router.url" />

		<!-- Responsive -->
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon (Best Practice) -->
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
		<link rel="shortcut icon" href="/favicon.ico" />

		<!-- Open Graph (Social Sharing) -->
		<meta property="og:title" content="Zyra UI – Modern Angular UI Library" />
		<meta property="og:description"
			content="Build fast, scalable Angular apps using Zyra UI components and utilities." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://www.zyraui.dev" />
		<meta property="og:image" content="https://www.zyraui.dev/og-image.png" />

		<!-- Twitter Card
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Zyra UI – Modern Angular UI Library" />
		<meta name="twitter:description" content="Reusable Angular UI components with modern design." />
		<meta name="twitter:image" content="https://zyra-ui.com/og-image.png" /> -->

		<!-- Performance: Preconnect Fonts (if using Google Fonts) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

		<!-- Manifest (Optional but recommended later) -->
		<!-- <link rel="manifest" href="/manifest.webmanifest" /> -->
	</head>

	<body>
		<app-root></app-root>
	</body>

</html>
