<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />

        <!-- Primary SEO -->
        <title>Zyra UI – Modern Angular UI Library</title>
        <meta
            name="description"
            content="Zyra UI is a modern Angular UI library with reusable components, utilities, and performance-focused design."
        />

        <!-- Angular base -->
        <base href="/" />

        <link rel="canonical" href="https://www.zyraui.dev/" />

        <!-- Responsive -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Favicon (Best Practice) -->
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
        <link rel="icon" type="image/png" sizes="248x248" href="/final-icon248.png" />
        <link rel="shortcut icon" href="/favicon.ico" />

        <!-- Open Graph (Social Sharing) -->
        <meta property="og:title" content="Zyra UI – Modern Angular UI Library" />
        <meta
            property="og:description"
            content="Build fast, scalable Angular apps using Zyra UI components and utilities."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.zyraui.dev" />
        <meta property="og:image" content="https://www.zyraui.dev/og-image.png" />

        <!-- Performance: Load external stylesheets without blocking first paint -->
        <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
        <link
            rel="preload"
            href="/fonts/instrument-sans-latin-standard-normal.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="/fonts/syne-latin-700-normal.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            as="style"
            onload="this.onload=null;this.rel='stylesheet'"
        />
        <noscript>
            <link
                rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            />
        </noscript>

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Organization",
                "name": "ZyraUI",
                "url": "https://www.zyraui.dev",
                "logo": "https://www.zyraui.dev/final-icon248.png"
            }
        </script>
    </head>

    <body>
        <app-root></app-root>
    </body>
</html>
