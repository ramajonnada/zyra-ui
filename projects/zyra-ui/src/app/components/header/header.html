<header class="site-header">
    <div class="site-header__left">
        <button
            class="site-header__burger"
            type="button"
            (click)="onToggle()"
            [attr.aria-label]="menuLabel()"
            [attr.aria-expanded]="publicPage() ? mobileNavOpen() : null"
        >
            <span class="site-header__sr-only">{{ menuLabel() }}</span>
            <span></span>
            <span></span>
            <span></span>
        </button>

        <a class="site-header__logo" routerLink="/">
            <img
                class="site-header__logo-img"
                [src]="isDark() ? '/without-bg-white-line-zyra-ui.png' : '/without-bg-black-line-zyra-ui.png'"
                alt=""
                aria-hidden="true"
                width="28"
                height="28"
            />
            <span class="site-header__logo-text">Zyra<span>UI</span></span>
            <span class="site-header__version">{{ version }}</span>
        </a>
    </div>

    <nav class="site-header__nav" aria-label="Primary">
        @for (link of navLinks; track link.route) {
            <a
                class="site-header__nav-link"
                [routerLink]="link.route"
                routerLinkActive="is-active"
                [routerLinkActiveOptions]="{ exact: link.route === '/' }"
            >
                {{ link.label }}
            </a>
        }
    </nav>

    <div class="site-header__actions">
        <a
            class="site-header__repo"
            href="https://github.com/ramajonnada/zyra-ui"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Zyra UI on GitHub"
        >
            <fa-icon [icon]="icons.github" />
            <span>GitHub</span>
            @if (githubStars) {
                <strong>{{ githubStars }}</strong>
            }
        </a>

        <button
            type="button"
            class="site-header__theme"
            (click)="toggleTheme()"
            [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
            <span class="site-header__sr-only">
                {{ isDark() ? 'Switch to light mode' : 'Switch to dark mode' }}
            </span>
            <fa-icon [icon]="icons.moon" />
        </button>

        <zyra-button size="sm" routerLink="/components">Get started</zyra-button>
    </div>
</header>

@if (mobileNavOpen()) {
    <div class="site-header__mobile-panel">
        <nav class="site-header__mobile-nav" aria-label="Mobile">
            @for (link of navLinks; track link.route) {
                <a
                    class="site-header__mobile-link"
                    [routerLink]="link.route"
                    routerLinkActive="is-active"
                    [routerLinkActiveOptions]="{ exact: link.route === '/' }"
                    (click)="closeMobileNav()"
                >
                    {{ link.label }}
                </a>
            }
        </nav>

        <div class="site-header__mobile-actions">
            <a
                class="site-header__mobile-repo"
                href="https://github.com/ramajonnada/zyra-ui"
                target="_blank"
                rel="noopener noreferrer"
            >
                <fa-icon [icon]="icons.github" />
                <span>GitHub</span>
            </a>

            <a class="site-header__mobile-cta" routerLink="/components" (click)="closeMobileNav()">
                Get started
            </a>
        </div>
    </div>
}
