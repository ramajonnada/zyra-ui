<!-- Mobile overlay -->
<div class="sidebar-overlay" [class.visible]="overlayVisible()" (click)="onOverlayClick()"></div>

<aside class="sidebar" [class.open]="isOpen()">

	<div class="sidebar__section-label">Menu</div>
	<nav class="sidebar__nav">
		<a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active" class="sidebar__item">
			<span class="sidebar__icon">{{ item.icon }}</span>
			<span class="sidebar__label">{{ item.label }}</span>
			@if (item.badge) {
			<span class="sidebar__badge">{{ item.badge }}</span>
			}
		</a>
	</nav>
