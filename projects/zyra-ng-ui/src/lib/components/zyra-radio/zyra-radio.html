<label [class]="hostClass()" [for]="radioId">

    <button
        [id]="radioId"
        type="button"
        role="radio"
        class="zyr-radio__circle"
        [attr.aria-checked]="checked()"
        [attr.aria-label]="label() || null"
        [disabled]="isDisabled() || null"
        (click)="select()"
    >
        @if (checked()) {
        <span class="zyr-radio__dot"></span>
        }
    </button>

    @if (label()) {
    <span class="zyr-radio__label">{{ label() }}</span>
    }

</label>
