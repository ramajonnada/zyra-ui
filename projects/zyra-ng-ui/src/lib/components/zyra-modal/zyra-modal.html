@if (open()) {
    <div class="zyr-modal" role="presentation" (click)="onBackdropClick($event)">
        <div
            #modalPanel
            [class]="panelClass()"
            role="dialog"
            aria-modal="true"
            [attr.aria-label]="title() || 'Modal'"
            tabindex="-1"
        >
            <!-- Header -->
            <div class="zyr-modal__header">
                <h2 class="zyr-modal__title">{{ title() }}</h2>
                @if (dismissible()) {
                    <button
                        class="zyr-modal__close"
                        type="button"
                        aria-label="Close"
                        (click)="closeForced()"
                    >
                        <span aria-hidden="true">×</span>
                    </button>
                }
            </div>

            <!-- Body -->
            <div class="zyr-modal__body">
                <ng-content />
            </div>

            <!-- Footer -->
            <div class="zyr-modal__footer">
                <ng-content select="[slot=footer]" />
            </div>
        </div>
    </div>
}
