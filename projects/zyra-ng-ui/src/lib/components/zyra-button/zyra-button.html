<button [class]="hostClass()" [type]="type()" [disabled]="disabled() || loading()"
	[attr.aria-disabled]="disabled() || loading()" [attr.aria-busy]="loading()" (click)="handleClick($event)">
	@if (loading()) {
	<zyra-spinner [size]="spinnerSize()" [color]="spinnerColor()" />
	}
	@if (iconLeft() && !loading()) {
	<span class="zyr-btn__icon zyr-btn__icon--left" aria-hidden="true">
		{{ iconLeft() }}
	</span>
	}
	<span class="zyr-btn__label">
		<ng-content />
	</span>
	@if (iconRight()) {
	<span class="zyr-btn__icon zyr-btn__icon--right" aria-hidden="true">
		{{ iconRight() }}
	</span>
	}
</button>
