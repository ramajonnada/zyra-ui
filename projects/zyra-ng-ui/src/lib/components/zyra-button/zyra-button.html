<button
    [class]="hostClass()"
    [type]="type()"
    [disabled]="disabled() || loading()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-disabled]="disabled() || loading()"
    [attr.aria-busy]="loading()"
    (click)="handleClick($event)"
>
    @if (loading()) {
        <zyra-spinner [size]="spinnerSize()" [color]="spinnerColor()" />
    }
    @if (!loading()) {
        <span class="zyr-btn__icon zyr-btn__icon--left" aria-hidden="true">
            <ng-content select="[slot=prefix]" />
        </span>
    }
    @if (leftIconDefinition() && !loading()) {
        <span class="zyr-btn__icon zyr-btn__icon--left" aria-hidden="true">
            <fa-icon [icon]="leftIconDefinition()!" />
        </span>
    } @else if (leftIconText() && !loading()) {
        <span class="zyr-btn__icon zyr-btn__icon--left" aria-hidden="true">
            {{ leftIconText() }}
        </span>
    }
    <span class="zyr-btn__label">
        <ng-content />
    </span>
    @if (!loading()) {
        <span class="zyr-btn__icon zyr-btn__icon--right" aria-hidden="true">
            <ng-content select="[slot=suffix]" />
        </span>
    }
    @if (rightIconDefinition() && !loading()) {
        <span class="zyr-btn__icon zyr-btn__icon--right" aria-hidden="true">
            <fa-icon [icon]="rightIconDefinition()!" />
        </span>
    } @else if (rightIconText() && !loading()) {
        <span class="zyr-btn__icon zyr-btn__icon--right" aria-hidden="true">
            {{ rightIconText() }}
        </span>
    }
</button>
