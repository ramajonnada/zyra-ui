<input class="zyra-input-element" 
	[id]="inputId()" 
	[type]="type()" 
	[attr.placeholder]="placeholder()" 
	[value]="value()"
	[required]="required()" 
	[disabled]="disabled()" 
	[attr.aria-invalid]="errorState()" 
	[attr.aria-required]="required()"
	(input)="handleInput($event)" 
	(focus)="handleFocus()" 
	(blur)="handleBlur()" />
