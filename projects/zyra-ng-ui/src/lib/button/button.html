<button class="zyra-btn" [class]="variant + ' ' + size" [class.full-width]="fullWidth" [disabled]="disabled || loading">
	@if(!loading){
	<ng-content></ng-content>
	} @else if (loading) {
	<span class="loader"></span> Processing…
	}
</button>
